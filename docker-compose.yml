# CLaaS Local Development
# Usage: docker-compose up -d
# Dashboard: http://localhost:8082
# API: http://localhost:8080/api/v1/health

version: "3.8"

services:
  dispatcher:
    build:
      context: .
      dockerfile: cloudformation/Dockerfile.dispatcher
    container_name: claas-dispatcher
    ports:
      - "8080:8080"
      - "8082:8082"
    volumes:
      - claas-data:/data
    environment:
      - CONTINUOUS_CLAUDE_ENABLED=0
      - DISPATCHER_DASHBOARD_PORT=8082
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: unless-stopped

volumes:
  claas-data:
    driver: local
